version: 1
retry_budget:
  default_max_retries: 2
  by_category:
    transient_timeout: 3
    tool_contract_violation: 0

policies:
  - id: STOP_ON_TOOL_CONTRACT_VIOLATION
    when:
      category: tool_contract_violation
    action: stop
    reason: Tool contract violation is not retryable without changing inputs.

  - id: RETRY_ON_TRANSIENT_TIMEOUT
    when:
      category: transient_timeout
    action: retry
    reason: Transient timeout can be retried within budget.

  - id: ESCALATE_ON_UNKNOWN_HIGH
    when:
      category: unknown
      severity: high
    action: escalate
    reason: Unknown high severity failure requires human inspection.

  - id: PAUSE_ON_CONTEXT_BUDGET_EXCEEDED
    when:
      category: context_budget_exceeded
    action: pause
    reason: Context budget exceeded; snapshot current state and pause for review.

  - id: PAUSE_ON_PROGRESS_NO_CHANGE
    when:
      category: progress_no_change
    action: pause
    reason: Progress did not change across the configured threshold; pause for human review.
