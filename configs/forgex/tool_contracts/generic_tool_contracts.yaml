version: 1
tools:
  - name: demo.expensive_generation
    capability: generation.expensive
    description: Simulated expensive generation tool that requires a prompt and a non-empty set of required assets. Used only for the contract-violation demo; it never calls any external API.
    required_inputs:
      - prompt
      - required_assets
    required_outputs:
      - result_url
    validators:
      - required_inputs_present
      - prompt_not_empty
      - required_assets_not_empty
      - required_outputs_present
    risk_level: high
    side_effect: external_api_call
    idempotent: false
    timeout_seconds: 120
    retry_policy: no_retry_on_contract_violation
    required_authority_level: L2
    approval_required: false
    metadata:
      source: generic_contract_violation
      owner: forgex-demo
