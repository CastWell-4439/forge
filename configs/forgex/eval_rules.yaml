version: 1
suites:
  - id: generic_contract_regression_v1
    cases:
      - id: GENERIC_REQUIRED_ASSETS_EMPTY
        assertions:
          - path: policy_decisions[0].action
            op: eq
            value: allow
          - path: policy_decisions[0].authority
            op: eq
            value: L2
          - path: contract_validations[3].status
            op: eq
            value: failed
          - path: contract_validations[3].validator
            op: eq
            value: required_assets_not_empty
          - path: artifacts[0].status
            op: eq
            value: missing
          - path: world_state.entries[0].status
            op: eq
            value: accepted
          - path: errors[0].category
            op: eq
            value: tool_contract_violation
          - path: stop_signals[0].source
            op: eq
            value: contract_validation
          - path: stop_decisions[0].action
            op: eq
            value: stop
          - path: stop_decisions[0].reason
            op: contains
            value: arbiter selected
        trajectory:
          required_events:
            - run_started
            - tool_called
            - tool_failed
            - stop_decided
          expected_tool_calls:
            - demo.expensive_generation
          forbidden_tools: []
          max_tool_calls: 1
          required_stop_actions:
            - stop

  - id: generic_contract_happy_v1
    cases:
      - id: GENERIC_REQUIRED_ASSETS_PRESENT
        assertions:
          - path: run.status
            op: eq
            value: succeeded
          - path: policy_decisions[0].action
            op: eq
            value: allow
          - path: policy_decisions[0].authority
            op: eq
            value: L2
          - path: contract_validations[3].validator
            op: eq
            value: required_assets_not_empty
          - path: contract_validations[3].status
            op: eq
            value: passed
          - path: contract_validations[4].validator
            op: eq
            value: required_outputs_present
          - path: contract_validations[4].status
            op: eq
            value: passed
          - path: artifacts[0].status
            op: eq
            value: produced
          - path: artifacts[1].status
            op: eq
            value: valid
          - path: world_state.entries[0].status
            op: eq
            value: accepted
          - path: stop_signals[0].source
            op: eq
            value: llm_suggested_done
          - path: stop_decisions[0].action
            op: eq
            value: continue
          - path: stop_decisions[0].reason
            op: contains
            value: arbiter selected
        trajectory:
          required_events:
            - run_started
            - tool_called
            - tool_succeeded
            - stop_decided
          expected_tool_calls:
            - demo.expensive_generation
          forbidden_tools: []
          max_tool_calls: 1
          required_stop_actions:
            - continue
