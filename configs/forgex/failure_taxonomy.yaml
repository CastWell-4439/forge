version: 1
rules:
  - id: GENERIC_REQUIRED_ASSETS_EMPTY
    category: tool_contract_violation
    severity: high
    retryable: false
    source: demo
    match:
      message_contains:
        - required_assets
        - empty
      operation_contains: demo.expensive_generation
    recommendation: demo.expensive_generation must provide non-empty required_assets. Stop and ask upstream to provide the missing required assets.

  - id: TOOL_TIMEOUT
    category: transient_timeout
    severity: medium
    retryable: true
    source: builtin
    match:
      message_contains:
        - timeout
    recommendation: Retry with budget; escalate if retry budget is exhausted.
