# Kueue CRD Configuration for Forge
# Kueue manages GPU job queuing and fair scheduling.
# Prerequisites: Kueue operator installed in the cluster.
#
# Architecture:
#   ResourceFlavor → defines GPU/CPU resource types
#   ClusterQueue   → cluster-wide quota pool
#   LocalQueue      → namespace-scoped queue that borrows from ClusterQueue
#
# Usage: kubectl apply -f deploy/kueue/

---
apiVersion: kueue.x-k8s.io/v1beta1
kind: ResourceFlavor
metadata:
  name: forge-gpu-a100
spec:
  nodeLabels:
    gpu.nvidia.com/model: A100
---
apiVersion: kueue.x-k8s.io/v1beta1
kind: ResourceFlavor
metadata:
  name: forge-gpu-t4
spec:
  nodeLabels:
    gpu.nvidia.com/model: T4
---
apiVersion: kueue.x-k8s.io/v1beta1
kind: ResourceFlavor
metadata:
  name: forge-cpu
spec: {}

---
apiVersion: kueue.x-k8s.io/v1beta1
kind: ClusterQueue
metadata:
  name: forge-cluster-queue
spec:
  namespaceSelector: {}  # Accept from all namespaces
  queueingStrategy: BestEffortFIFO
  resourceGroups:
    - coveredResources: ["cpu", "memory", "nvidia.com/gpu"]
      flavors:
        - name: forge-gpu-a100
          resources:
            - name: "cpu"
              nominalQuota: 32
            - name: "memory"
              nominalQuota: 128Gi
            - name: "nvidia.com/gpu"
              nominalQuota: 8
        - name: forge-gpu-t4
          resources:
            - name: "cpu"
              nominalQuota: 16
            - name: "memory"
              nominalQuota: 64Gi
            - name: "nvidia.com/gpu"
              nominalQuota: 4
        - name: forge-cpu
          resources:
            - name: "cpu"
              nominalQuota: 64
            - name: "memory"
              nominalQuota: 256Gi

---
apiVersion: kueue.x-k8s.io/v1beta1
kind: LocalQueue
metadata:
  name: forge-local-queue
  namespace: forge
  annotations:
    kueue.x-k8s.io/default-queue: "true"
spec:
  clusterQueue: forge-cluster-queue
