apiVersion: v1
kind: Service
metadata:
  name: {{ include "forge.fullname" . }}-coordinator-headless
  labels:
    app.kubernetes.io/component: coordinator
    {{- include "forge.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - name: grpc
      port: {{ .Values.coordinator.service.grpcPort }}
      targetPort: grpc
      protocol: TCP
  selector:
    app.kubernetes.io/component: coordinator
    {{- include "forge.selectorLabels" . | nindent 4 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "forge.fullname" . }}-coordinator
  labels:
    app.kubernetes.io/component: coordinator
    {{- include "forge.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: grpc
      port: {{ .Values.coordinator.service.grpcPort }}
      targetPort: grpc
      protocol: TCP
    - name: http
      port: {{ .Values.coordinator.service.httpPort }}
      targetPort: http
      protocol: TCP
  selector:
    app.kubernetes.io/component: coordinator
    {{- include "forge.selectorLabels" . | nindent 4 }}
