# values-prod.yaml — Production overrides

coordinator:
  replicas: 3
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: "2"
      memory: 1Gi
  pdb:
    minAvailable: 2

workerGo:
  replicas: 3
  hpa:
    enabled: true
    minReplicas: 3
    maxReplicas: 20
    targetCPU: 65

workerPython:
  replicas: 3
  hpa:
    enabled: true
    minReplicas: 3
    maxReplicas: 15
    targetCPU: 70

workerCpp:
  replicas: 2
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPU: 60
