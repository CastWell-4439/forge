# Bug Fix Workflow
# Triggered by: Feishu project HITL request or Cron polling
# Flow: AI analysis → code fix → review → HITL approval → merge

name: bug_fix
version: "2.0"
timeout: 2h

triggers:
  - type: cron
    schedule: "*/2 * * * *"  # every 2 minutes
    params:
      source: feishu_project
      filter: "status = 'open' AND priority IN ('P0', 'P1')"

  - type: webhook
    path: /api/workflows/bug_fix/trigger

tasks:
  # Step 1: AI analyzes the bug report
  analyze_bug:
    handler: ai
    params:
      model: claude-sonnet-4-20250514
      system_prompt: |
        你是一个资深 Go 开发工程师。分析以下 bug 报告，确定：
        1. 根因分析
        2. 影响范围
        3. 修复方案（具体到文件和函数）
        4. 风险评估（高/中/低）
      input: "{{ .trigger.bug_description }}"
      output_format: json
    timeout: 60s
    on_failure: abort

  # Step 2: HITL - Human reviews AI analysis before proceeding
  approve_analysis:
    handler: hitl
    depends_on: [analyze_bug]
    params:
      action: request_approval
      message: |
        🐛 Bug 分析完成，请审批修复方案：
        
        **Bug**: {{ .trigger.bug_title }}
        **根因**: {{ .results.analyze_bug.root_cause }}
        **方案**: {{ .results.analyze_bug.fix_plan }}
        **风险**: {{ .results.analyze_bug.risk_level }}
      options: [approve, reject, modify]
      timeout: 4h
    condition: 'results.analyze_bug.risk_level != "low"'
    on_result:
      rejected: abort
      timeout: abort

  # Step 3: Create feature branch and apply fix
  create_branch:
    handler: git
    depends_on: [approve_analysis]
    params:
      action: create_branch
      base: develop
      name: "fix/{{ .trigger.bug_id }}"
    timeout: 30s

  # Step 4: AI writes the code fix
  write_fix:
    handler: claude_code
    depends_on: [create_branch]
    params:
      action: execute
      prompt: |
        根据以下分析修复 bug：
        
        分析结果: {{ .results.analyze_bug | toJson }}
        
        要求：
        1. 只修改必要的文件
        2. 添加对应的单元测试
        3. 确保 go build ./... 和 go test ./... 通过
      working_dir: "{{ .project.local_path }}"
      branch: "fix/{{ .trigger.bug_id }}"
    timeout: 10m
    retry:
      max_attempts: 2
      backoff: exponential
      initial_delay: 30s

  # Step 5: Run tests
  run_tests:
    handler: shell
    depends_on: [write_fix]
    params:
      action: execute
      command: "go test ./..."
      working_dir: "{{ .project.local_path }}"
    timeout: 5m
    on_result:
      failure:
        action: goto
        target: write_fix
    loop:
      max_iterations: 3
      break_on: 'results.run_tests.exit_code == 0'

  # Step 6: AI code review
  code_review:
    handler: ai
    depends_on: [run_tests]
    params:
      model: claude-sonnet-4-20250514
      system_prompt: |
        Review the following code changes. Check for:
        1. Correctness
        2. Edge cases
        3. Performance implications
        4. Test coverage
      input: "{{ .results.write_fix.diff }}"
      output_format: json
    timeout: 60s

  # Step 7: Human final approval
  final_approval:
    handler: hitl
    depends_on: [code_review]
    params:
      action: request_approval
      message: |
        ✅ Bug 修复完成，请最终审批：
        
        **Bug**: {{ .trigger.bug_title }}
        **分支**: fix/{{ .trigger.bug_id }}
        **变更文件**: {{ .results.write_fix.files_changed }}
        **测试**: {{ .results.run_tests.summary }}
        **Review**: {{ .results.code_review.summary }}
      options: [approve, reject]
      timeout: 8h
    on_result:
      rejected: abort

  # Step 8: Push and create MR
  push_and_mr:
    handler: git
    depends_on: [final_approval]
    params:
      action: push_and_mr
      branch: "fix/{{ .trigger.bug_id }}"
      target: dev-offline
      title: "fix: {{ .trigger.bug_title }}"
      description: |
        ## Bug 修复
        
        **根因**: {{ .results.analyze_bug.root_cause }}
        **修复**: {{ .results.analyze_bug.fix_plan }}
        
        ---
        _Auto-generated by Forge v2_
    timeout: 60s

  # Step 9: Notify completion
  notify_done:
    handler: hitl
    depends_on: [push_and_mr]
    params:
      action: notify
      workflow_id: "{{ .workflow_id }}"
      message: |
        🎉 Bug 修复流程完成！
        
        **Bug**: {{ .trigger.bug_title }}
        **MR**: {{ .results.push_and_mr.mr_url }}
        **状态**: 已提交到 dev-offline，等待 CI 部署
