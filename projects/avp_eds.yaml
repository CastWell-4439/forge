# Example Project Configuration
# Copy this template and adapt for your own project.

project:
  name: my-go-service
  description: Example gRPC microservice
  language: go
  repo: git@github.com:your-org/your-service.git
  local_path: /path/to/your/service
  default_branch: develop

# Git workflow
git:
  flow: gitflow
  branches:
    production: master
    staging: develop
    testing: dev-offline
  feature_prefix: feature/
  fix_prefix: fix/

# Database connections (read-only for Forge)
databases:
  primary:
    type: postgres
    host: localhost
    port: 5432
    database: my_database
    user: forge
    password_env: FORGE_PG_PASSWORD  # set via environment variable
    max_rows: 100
    timeout: 30s

  redis:
    type: redis
    host: localhost
    port: 6379
    db: 0
    password_env: FORGE_REDIS_PASSWORD
    allowed_commands: [GET, KEYS]

# Build & Test
build:
  command: go build ./...
  test_command: go test ./...
  grpc_port: 50051

# Code conventions
conventions:
  allowed_shell_commands:
    - go build
    - go test
    - go vet
    - go fmt
    - git status
    - git diff
    - git log

  protected_files:
    - conf/*.toml
    - .gitignore
    - go.sum

  review_checklist:
    - "No hardcoded credentials"
    - "Error handling present for all DB calls"
    - "gRPC errors use proper status codes"
    - "Tests cover happy path + error cases"

# HITL settings
hitl:
  approvers:
    - channel: feishu
      session_key: main
  default_timeout: 4h
  auto_approve_low_risk: true

# Trigger configuration
triggers:
  feishu_project:
    type: cron
    schedule: "*/2 * * * *"
    source: feishu_mcp
    mcp_endpoint: https://project.feishu.cn/mcp_server/v1
    filter:
      work_item_type: issue
      status: open
      priority: [P0, P1]
