syntax = "proto3";

package forge.workflow.v1;

option go_package = "github.com/castwell/forge/api/proto/workflowpb";

import "google/protobuf/timestamp.proto";

// WorkflowService provides gRPC APIs for workflow management and HITL interaction.
service WorkflowService {
  // TriggerWorkflow manually triggers a workflow by name.
  rpc TriggerWorkflow(TriggerWorkflowRequest) returns (TriggerWorkflowResponse);

  // GetWorkflowStatus returns the status of a running workflow instance.
  rpc GetWorkflowStatus(GetWorkflowStatusRequest) returns (GetWorkflowStatusResponse);

  // ListWorkflows returns all registered workflows.
  rpc ListWorkflows(ListWorkflowsRequest) returns (ListWorkflowsResponse);

  // PauseWorkflow pauses a running workflow instance.
  rpc PauseWorkflow(PauseWorkflowRequest) returns (PauseWorkflowResponse);

  // ResumeHITL responds to a HITL request, resuming the paused workflow.
  rpc ResumeHITL(ResumeHITLRequest) returns (ResumeHITLResponse);

  // CancelWorkflow cancels a running workflow instance.
  rpc CancelWorkflow(CancelWorkflowRequest) returns (CancelWorkflowResponse);
}

// --- TriggerWorkflow ---

message TriggerWorkflowRequest {
  string workflow_name = 1;
  map<string, string> inputs = 2;
}

message TriggerWorkflowResponse {
  string instance_id = 1;
  string status = 2;
}

// --- GetWorkflowStatus ---

message GetWorkflowStatusRequest {
  string instance_id = 1;
}

message GetWorkflowStatusResponse {
  string instance_id = 1;
  string workflow_name = 2;
  string status = 3; // running, paused, completed, failed, cancelled
  repeated TaskStatus tasks = 4;
  google.protobuf.Timestamp started_at = 5;
  google.protobuf.Timestamp completed_at = 6;
}

message TaskStatus {
  string task_id = 1;
  string stage_name = 2;
  string worker = 3;
  string action = 4;
  string status = 5; // pending, running, completed, failed, skipped
  string output = 6;
  string error = 7;
}

// --- ListWorkflows ---

message ListWorkflowsRequest {}

message ListWorkflowsResponse {
  repeated WorkflowInfo workflows = 1;
}

message WorkflowInfo {
  string name = 1;
  string version = 2;
  string description = 3;
  repeated string trigger_types = 4;
}

// --- PauseWorkflow ---

message PauseWorkflowRequest {
  string instance_id = 1;
  string reason = 2;
}

message PauseWorkflowResponse {
  bool success = 1;
}

// --- ResumeHITL ---

message ResumeHITLRequest {
  string request_id = 1;
  string decision = 2;   // one of the original options
  string feedback = 3;   // optional free-text
}

message ResumeHITLResponse {
  bool success = 1;
  string instance_id = 2;
}

// --- CancelWorkflow ---

message CancelWorkflowRequest {
  string instance_id = 1;
  string reason = 2;
}

message CancelWorkflowResponse {
  bool success = 1;
}
